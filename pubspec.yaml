name: flutter_dictation_recorder
description: "一個為小學生提供簡單、直觀的默書練習工具，允許他們錄製默書內容，並按分類和課本名稱進行管理。"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '^3.8.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  json_annotation: ^4.11.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  record: ^6.2.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  # custom_lint: ^0.6.4
  # riverpod_lint: ^3.1.3
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true

